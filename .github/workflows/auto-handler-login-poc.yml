name: Auto handle for login - POC

permissions:
  issues: write
  contents: read

on:
  issues:
    types: [labeled]

jobs:
  request-intake-validation:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Update Ticket Comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const username = "${{ steps.extract_user.outputs.username }}";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: `🔄 Automation started for **${username}**.`
            });            
      - name: Wait for 30 seconds
        run: sleep 30            

  agentic-identity-recovery-engine:
    needs: request-intake-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Extract Username From Ticket
        id: extract_user
        run: |
          echo "Issue Body:"
          echo "${{ github.event.issue.body }}"

          BODY="${{ github.event.issue.body }}"

          USERNAME=$(echo "$BODY" | awk '/### Username/{getline; getline; print $0}')

          echo "Extracted Username: $USERNAME"

          echo "username=$USERNAME" >> $GITHUB_OUTPUT 

      - name: Print Username (Simulation Step)
        run: |
          USERNAME="${{ steps.extract_user.outputs.username }}"
          echo "Automation will reset password for user: $USERNAME"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}            

      - name: Reset Password
        run: |
          INPUT_USERNAME="${{ steps.extract_user.outputs.username }}"
          
          # Check if username already contains domain
          if [[ "$INPUT_USERNAME" == *"@"* ]]; then
            USER_UPN="$INPUT_USERNAME"
          else
            USER_UPN="$INPUT_USERNAME@v2tech.onmicrosoft.com"
          fi

          TEMP_PASSWORD="$(tr -dc 'A-Z' </dev/urandom | head -c1)$(tr -dc 'a-z' </dev/urandom | head -c5)$(tr -dc '0-9' </dev/urandom | head -c3)!@#$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c3)"

          echo "Resetting password for $USER_UPN"

          USER_ID=$(az ad user show --id $USER_UPN --query id -o tsv)

          az rest --method PATCH \
            --url "https://graph.microsoft.com/v1.0/users/$USER_ID" \
            --headers "Content-Type=application/json" \
            --body "{
              \"passwordProfile\": {
                \"forceChangePasswordNextSignIn\": true,
                \"password\": \"$TEMP_PASSWORD\"
              }
            }"

          echo "TEMP_PASSWORD=$TEMP_PASSWORD" >> $GITHUB_ENV
          echo "Password reset for $USER_UPN"
      - name: Wait for 30 seconds
        run: sleep 30            

  intelligent-notification-service:
    needs: agentic-identity-recovery-engine
    runs-on: ubuntu-latest
    steps:
      - name: Send Password Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Password Reset Notification
          to: shekach.ms@gmail.com
          from: GitHub Automation <${{ secrets.SMTP_USERNAME }}>
          body: |
            Your password has been reset.

            Temporary Password: ${{ env.TEMP_PASSWORD }}

            Please login and change your password immediately.
      - name: Wait for 30 seconds
        run: sleep 30                        

  service-request-closure-engine:
    needs: intelligent-notification-service
    runs-on: ubuntu-latest
    steps:
      - name: Close Ticket
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: "✅ Password reset completed automatically."
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              state: "closed"
            });

