name: Auto handle for login - POC

permissions:
  issues: write
  contents: read

on:
  issues:
    types: [labeled]

jobs:
  reset-password:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Extract Username From Ticket
        id: extract_user
        run: |
          echo "Issue Body:"
          echo "${{ github.event.issue.body }}"

          BODY="${{ github.event.issue.body }}"

          USERNAME=$(echo "$BODY" | awk '/### Username/{getline; getline; print $0}')

          echo "Extracted Username: $USERNAME"

          echo "username=$USERNAME" >> $GITHUB_OUTPUT 

      - name: Print Username (Simulation Step)
        run: |
          USERNAME="${{ steps.extract_user.outputs.username }}"
          echo "Automation will reset password for user: $USERNAME"

      - name: Update Ticket Comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const username = "${{ steps.extract_user.outputs.username }}";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: `🔄 Automation started for **${username}**.`
            });            

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}            

      - name: Reset Password
        run: |
          USERNAME="${{ steps.extract_user.outputs.username }}"
          TEMP_PASSWORD=$(openssl rand -base64 14 | tr -d '/+=' | cut -c1-14)

          USER_UPN="$USERNAME@mschandrashekar111gmail.onmicrosoft.com"

          echo "Resetting password for $USER_UPN"

          USER_ID=$(az ad user show --id $USER_UPN --query id -o tsv)

          az rest --method PATCH \
            --url "https://graph.microsoft.com/v1.0/users/$USER_ID" \
            --headers "Content-Type=application/json" \
            --body "{
              \"passwordProfile\": {
                \"forceChangePasswordNextSignIn\": true,
                \"password\": \"$TEMP_PASSWORD\"
              }
            }"

          echo "Password reset for $USER_UPN"


      - name: Send Email Notification
        run: |
          USER_UPN="shekach.ms@gmail.com"
          az account get-access-token --resource-type ms-graph
          az rest --method POST \
            --url "https://graph.microsoft.com/v1.0/users/automation@mschandrashekar111gmail.onmicrosoft.com/sendMail" \
            --headers "Content-Type=application/json" \
            --body "{
              \"message\": {
                \"subject\": \"Password Reset Notification\",
                \"body\": {
                  \"contentType\": \"Text\",
                  \"content\": \"Your password has been reset.\n\nTemporary Password: ${TEMP_PASSWORD}\n\nPlease login and change your password immediately.\"
                },
                \"toRecipients\": [
                  {
                    \"emailAddress\": {
                      \"address\": \"${USER_UPN}\"
                    }
                  }
                ]
              }
            }"
      - name: Close Ticket
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: "✅ Password reset completed automatically."
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              state: "closed"
            });

