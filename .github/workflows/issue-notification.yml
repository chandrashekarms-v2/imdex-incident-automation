name: Issue Created Notification

on:
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Issue Notification Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: New Helpdesk Ticket Created
          to: chandrashekar.ms@v2solutions.com
          from: GitHub Automation <${{ secrets.SMTP_USERNAME }}>
          html_body: |
            <h2>🚀 New Helpdesk Request Initiated</h2>

            <p>A new service request has been successfully logged.</p>

            <hr>

            <h3>🧾 Request Summary</h3>
            <b>Ticket ID: ${{ github.event.issue.number }}<br>

            <h3>Created By:</h3>
            <b>${{ github.event.issue.user.login }}</b>

            <h3>🔗 Access Ticket</h3>
            <a href="${{ github.event.issue.html_url }}">View Ticket</a>

            <hr>

            <p><b>🤖 Processed by AI-Orchestrated Identity Automation Platform</b></p>

            <p>V2 Tech Automation Platform</p>